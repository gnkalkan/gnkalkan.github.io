

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6"> 
        <div class="card calculator-card p-4">
            <h3 class="text-center mb-4 text-dark">Bahşiş Hesaplama</h3>
            
            <form id="bahsisForm" class="d-flex flex-column align-items-center"> 
                
                <div class="mb-3 w-75">
                    <label for="billAmount" class="form-label fw-bold small">Hesap Tutarı (₺)</label>
                    <input type="number" inputmode="decimal" class="form-control form-control-sm" id="billAmount" placeholder="Örn: 500" step="0.01" required>
                </div>

                <div class="mb-3 w-75">
                    <label for="tipRate" class="form-label fw-bold small">Bahşiş Oranı (%)</label>
                    <input type="number" inputmode="decimal" class="form-control form-control-sm" id="tipRate" value="10" step="0.1" required>
                </div>

                <div class="mb-4 w-75">
                    <label for="peopleCount" class="form-label fw-bold small">Kişi Sayısı (Hesabı Böl)</label>
                    <input type="number" inputmode="numeric" class="form-control form-control-sm" id="peopleCount" value="1" min="1" required>
                </div>

                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-dark px-4 btn-sm fw-bold" onclick="calculateBahsis()">HESAPLA</button>
                    <button type="button" class="btn btn-outline-secondary px-3 btn-sm" onclick="resetForm()">Temizle</button>
                </div>
            </form>

            <div id="resultBox" class="result d-none result-box text-center mt-4">
                <div class="row g-0">
                    <div class="col-4 border-end">
                        <small class="text-muted d-block" style="font-size: 0.7rem;">Bahşiş</small>
                        <span class="fw-bold text-success small" id="resTip">0.00 ₺</span>
                    </div>
                    <div class="col-4 border-end">
                        <small class="text-muted d-block" style="font-size: 0.7rem;">Kişi Başı</small>
                        <span class="fw-bold text-info small" id="resPerPerson">0.00 ₺</span>
                    </div>
                    <div class="col-4">
                        <small class="text-muted d-block" style="font-size: 0.7rem;">Genel Toplam</small>
                        <span class="fw-bold text-danger small" id="resTotal">0.00 ₺</span>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
