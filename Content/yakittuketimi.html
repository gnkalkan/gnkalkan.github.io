

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6"> 
        <div class="card calculator-card p-4">
            <h3 class="text-center mb-4 text-dark">Yakıt Tüketimi Hesaplama</h3>
            
            <form id="yakitForm" class="d-flex flex-column align-items-center"> 
                
                <div class="mb-3 w-75">
                    <label for="distanceKm" class="form-label fw-bold small">Gidilecek Mesafe (km)</label>
                    <input type="number" inputmode="decimal" class="form-control form-control-sm" id="distanceKm" placeholder="Örn: 450" step="0.1" required>
                </div>

                <div class="mb-3 w-75">
                    <label for="consumptionRate" class="form-label fw-bold small">100 km'de Tüketim (Litre)</label>
                    <input type="number" inputmode="decimal" class="form-control form-control-sm" id="consumptionRate" placeholder="Örn: 6.5" step="0.1" required>
                </div>

                <div class="mb-4 w-75">
                    <label for="fuelPrice" class="form-label fw-bold small">Yakıt Litre Fiyatı (₺)</label>
                    <input type="number" inputmode="decimal" class="form-control form-control-sm" id="fuelPrice" placeholder="Örn: 42.50" step="0.01" required>
                </div>

                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-dark px-4 btn-sm fw-bold" onclick="calculateFuelConsumption()">HESAPLA</button>
                    <button type="button" class="btn btn-outline-secondary px-3 btn-sm" onclick="resetForm()">Temizle</button>
                </div>
            </form>

            <div id="resultBox" class="result d-none result-box text-center mt-4">
                <div class="row g-0">
                    <div class="col-4 border-end">
                        <small class="text-muted d-block" style="font-size: 0.7rem;">Toplam Yakıt</small>
                        <span class="fw-bold text-dark small" id="resTotalLiters">0 L</span>
                    </div>
                    <div class="col-4 border-end">
                        <small class="text-muted d-block" style="font-size: 0.7rem;">Km Maliyeti</small>
                        <span class="fw-bold text-info small" id="resCostPerKm">0.00 ₺</span>
                    </div>
                    <div class="col-4">
                        <small class="text-muted d-block" style="font-size: 0.7rem;">Toplam Tutar</small>
                        <span class="fw-bold text-danger small" id="resTotalCost">0.00 ₺</span>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
