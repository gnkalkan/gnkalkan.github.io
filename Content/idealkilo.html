

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6"> 
        <div class="card calculator-card p-4">
            <h3 class="text-center mb-4 text-dark">İdeal Kilo Hesaplama</h3>
            
            <form id="idealKiloForm" class="d-flex flex-column align-items-center"> 
                
                <div class="mb-3 text-center w-75">
                    <label class="form-label fw-bold d-block small">Cinsiyet</label>
                    <div class="btn-group btn-group-sm w-100" role="group">
                        <input type="radio" class="btn-check" name="ikGender" id="ikGenderMale" value="male" checked autocomplete="off">
                        <label class="btn-outline-dark btn" for="ikGenderMale">Erkek</label>

                        <input type="radio" class="btn-check" name="ikGender" id="ikGenderFemale" value="female" autocomplete="off">
                        <label class="btn-outline-dark btn" for="ikGenderFemale">Kadın</label>
                    </div>
                </div>

                <div class="mb-3 w-75">
                    <label for="heightCm" class="form-label fw-bold small">Boyunuz (cm)</label>
                    <input type="number" inputmode="numeric" class="form-control form-control-sm" id="heightCm" placeholder="Örn: 175" required>
                </div>

                <div class="mb-4 w-75">
                    <label for="currentWeight" class="form-label fw-bold small">Mevcut Kilonuz (kg)</label>
                    <input type="number" inputmode="decimal" class="form-control form-control-sm" id="currentWeight" placeholder="Örn: 75" step="0.1" required>
                </div>

                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-dark px-4 btn-sm fw-bold" onclick="calculateIdealWeight()">HESAPLA</button>
                    <button type="button" class="btn btn-outline-secondary px-3 btn-sm" onclick="resetForm()">Temizle</button>
                </div>
            </form>

            <div id="resultBox" class="result d-none result-box text-center mt-4">
                <div class="row g-0">
                    <div class="col-4 border-end">
                        <small class="text-muted d-block" style="font-size: 0.7rem;">İdeal Kilonuz</small>
                        <span class="fw-bold text-success small" id="resIdealWeight">0 kg</span>
                    </div>
                    <div class="col-4 border-end">
                        <small class="text-muted d-block" style="font-size: 0.7rem;">Mevcut</small>
                        <span class="fw-bold text-dark small" id="resCurrentWeight">0 kg</span>
                    </div>
                    <div class="col-4">
                        <small class="text-muted d-block" style="font-size: 0.7rem;">Hedef</small>
                        <span class="fw-bold small" id="resGoal">-</span>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
