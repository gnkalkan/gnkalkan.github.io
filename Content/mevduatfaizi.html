

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6"> 
        <div class="card calculator-card p-4">
            <h3 class="text-center mb-4 text-dark">Mevduat Faizi Hesaplama</h3>
            
            <form id="mevduatForm" class="d-flex flex-column align-items-center"> 
                <div class="mb-3 w-75">
                    <label for="amount" class="form-label fw-bold small">Anapara Tutarı (₺)</label>
                    <input type="number" inputmode="decimal" class="form-control form-control-sm" id="amount" placeholder="Örn: 10000" step="0.01" required>
                </div>

                <div class="mb-3 w-75">
                    <label for="interestRate" class="form-label fw-bold small">Yıllık Faiz Oranı (%)</label>
                    <input type="number" inputmode="decimal" class="form-control form-control-sm" id="interestRate" placeholder="Örn: 45" step="0.01" required>
                </div>

                <div class="mb-3 w-75">
                    <label for="days" class="form-label fw-bold small">Vade (Gün)</label>
                    <input type="number" inputmode="numeric" class="form-control form-control-sm" id="days" placeholder="Örn: 32" required>
                </div>

                <div class="mb-4 text-center">
                    <label class="form-label fw-bold d-block small">Getiri Türü</label>
                    <div class="btn-group btn-group-sm" role="group" aria-label="Basic radio toggle button group">
                        <input type="radio" class="btn-check" name="calcType" id="typeNet" value="net" checked autocomplete="off">
                        <label class="btn-outline-dark btn" for="typeNet">Net Getiri</label>

                        <input type="radio" class="btn-check" name="calcType" id="typeBrut" value="brut" autocomplete="off">
                        <label class="btn-outline-dark btn" for="typeBrut">Brüt Getiri</label>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-dark px-4 btn-sm fw-bold" onclick="calculateDepositInterest()">HESAPLA</button>
                    <button type="button" class="btn btn-outline-secondary px-3 btn-sm" onclick="resetForm()">Temizle</button>
                </div>
            </form>

            <div id="resultBox" class="result d-none result-box text-center mt-4">
                <div class="row g-0">
                    <div class="col-4 border-end">
                        <small class="text-muted d-block" style="font-size: 0.7rem;">Anapara</small>
                        <span class="fw-bold text-dark small" id="resBase">0.00 ₺</span>
                    </div>
                    <div class="col-4 border-end">
                        <small class="text-muted d-block" style="font-size: 0.7rem;">Faiz Getirisi</small>
                        <span class="fw-bold text-success small" id="resInterest">0.00 ₺</span>
                    </div>
                    <div class="col-4">
                        <small class="text-muted d-block" style="font-size: 0.7rem;">Vade Sonu Toplam</small>
                        <span class="fw-bold text-primary small" id="resTotal">0.00 ₺</span>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
