

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6"> 
        <div class="card calculator-card p-4">
            <h3 class="text-center mb-4 text-dark">Vücut Kitle İndeksi (VKİ)</h3>
            
            <form id="vkiForm" class="d-flex flex-column align-items-center"> 
                <div class="mb-3 w-75">
                    <label for="heightCm" class="form-label fw-bold small">Boyunuz (cm)</label>
                    <input type="number" inputmode="numeric" class="form-control form-control-sm" id="heightCm" placeholder="Örn: 175" required>
                </div>

                <div class="mb-4 w-75">
                    <label for="weightKg" class="form-label fw-bold small">Kilonuz (kg)</label>
                    <input type="number" inputmode="decimal" class="form-control form-control-sm" id="weightKg" placeholder="Örn: 70" step="0.1" required>
                </div>

                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-dark px-4 btn-sm fw-bold" onclick="calculateVKI()">HESAPLA</button>
                    <button type="button" class="btn btn-outline-secondary px-3 btn-sm" onclick="resetForm()">Temizle</button>
                </div>
            </form>

            <div id="resultBox" class="result d-none result-box text-center mt-4">
                <div class="row g-0">
                    <div class="col-4 border-end">
                        <small class="text-muted d-block" style="font-size: 0.7rem;">Boy / Kilo</small>
                        <span class="fw-bold text-dark small" id="resHeightWeight">-</span>
                    </div>
                    <div class="col-4 border-end">
                        <small class="text-muted d-block" style="font-size: 0.7rem;">VKİ Değeri</small>
                        <span class="fw-bold text-primary small" id="resVki">0.00</span>
                    </div>
                    <div class="col-4">
                        <small class="text-muted d-block" style="font-size: 0.7rem;">Durum</small>
                        <span class="fw-bold small" id="resStatus">-</span>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
