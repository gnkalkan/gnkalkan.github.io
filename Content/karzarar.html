

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6"> 
        <div class="card calculator-card p-4">
            <h3 class="text-center mb-4 text-dark">Kâr / Zarar Hesaplama</h3>
            
            <form id="karZararForm" class="d-flex flex-column align-items-center"> 
                <div class="mb-3 w-75">
                    <label for="costAmount" class="form-label fw-bold small">Maliyet Tutarı (₺)</label>
                    <input type="number" inputmode="decimal" class="form-control form-control-sm" id="costAmount" placeholder="Örn: 1000" step="0.01" required>
                </div>

                <div class="mb-3 w-75">
                    <label for="rateAmount" class="form-label fw-bold small">İşlem Oranı (%)</label>
                    <input type="number" inputmode="decimal" class="form-control form-control-sm" id="rateAmount" placeholder="Örn: 25" step="0.01" required>
                </div>

                <div class="mb-4 text-center">
                    <label class="form-label fw-bold d-block small">İşlem Türü</label>
                    <div class="btn-group btn-group-sm" role="group" aria-label="Basic radio toggle button group">
                        <input type="radio" class="btn-check" name="calcType" id="typeKar" value="kar" checked autocomplete="off">
                        <label class="btn-outline-dark btn" for="typeKar">Kâr Ekle (+)</label>

                        <input type="radio" class="btn-check" name="calcType" id="typeZarar" value="zarar" autocomplete="off">
                        <label class="btn-outline-dark btn" for="typeZarar">Zarar Düş (-)</label>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-dark px-4 btn-sm fw-bold" onclick="calculateProfitLoss()">HESAPLA</button>
                    <button type="button" class="btn btn-outline-secondary px-3 btn-sm" onclick="resetForm()">Temizle</button>
                </div>
            </form>

            <div id="resultBox" class="result d-none result-box text-center mt-4">
                <div class="row g-0">
                    <div class="col-4 border-end">
                        <small class="text-muted d-block" style="font-size: 0.7rem;">Maliyet</small>
                        <span class="fw-bold text-dark small" id="resCost">0.00 ₺</span>
                    </div>
                    <div class="col-4 border-end">
                        <small class="text-muted d-block" style="font-size: 0.7rem;" id="lblProfitLoss">Kâr Tutarı</small>
                        <span class="fw-bold small" id="resProfitLoss">0.00 ₺</span>
                    </div>
                    <div class="col-4">
                        <small class="text-muted d-block" style="font-size: 0.7rem;">Satış Fiyatı</small>
                        <span class="fw-bold text-primary small" id="resTotal">0.00 ₺</span>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
