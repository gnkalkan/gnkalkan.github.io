

    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6"> 
            <div class="card calculator-card p-4 bg-white rounded-3">
                <h3 class="text-center mb-4 card-header-custom">İskonto Hesaplama</h3>
                
                <form id="discountForm" class="d-flex flex-column align-items-center"> 
                    
                    <div class="mb-3 w-75"> 
                        <label for="price" class="form-label fw-bold small">Fiyat Giriniz (₺)</label>
                        <input type="number" inputmode="decimal" class="form-control form-control-sm" id="price" placeholder="Örn: 1000" step="0.01" required>
                    </div>

                    <div class="mb-4 w-75">
                        <label for="discountRate" class="form-label fw-bold small">İskonto Oranı (%)</label>
                        <div class="input-group input-group-sm">
                            <input type="number" class="form-control form-control-sm" id="discountRate" placeholder="Örn: 20" min="0" max="100">
                            <span class="input-group-text">%</span>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-dark px-4 btn-sm fw-bold" onclick="calculateDiscount()">HESAPLA</button>
                        <button type="button" class="btn btn-outline-secondary px-3 btn-sm" onclick="resetForm()">Temizle</button>
                    </div>
                </form>

                <div id="resultBox" class="result d-none result-box text-center mt-4">
                    <div class="row g-0 rounded border">
                        <div class="col-4 border-end py-2 bg-light">
                            <small class="text-muted d-block" style="font-size: 0.7rem;">İskontosuz</small>
                            <span class="fw-bold text-dark small" id="resBase">0.00 ₺</span>
                        </div>
                        <div class="col-4 border-end py-2 bg-light">
                            <small class="text-muted d-block" style="font-size: 0.7rem;">İndirim</small>
                            <span class="fw-bold text-danger small" id="resDiscount">0.00 ₺</span>
                        </div>
                        <div class="col-4 py-2 bg-light">
                            <small class="text-muted d-block" style="font-size: 0.7rem;">Net Tutar</small>
                            <span class="fw-bold text-success small" id="resTotal">0.00 ₺</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
