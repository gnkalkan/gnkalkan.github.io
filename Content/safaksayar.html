

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6"> 
        <div class="card calculator-card p-4">
            <h3 class="text-center mb-4 text-dark">Şafak / Geri Sayım</h3>
            
            <form id="safakForm" class="d-flex flex-column align-items-center"> 
                
                <div class="mb-4 w-75">
                    <label for="targetDate" class="form-label fw-bold small">Hedef Tarih (Tezkere, Sınav, Düğün vb.)</label>
                    <input type="date" class="form-control form-control-sm" id="targetDate" required>
                </div>

                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-dark px-4 btn-sm fw-bold" onclick="calculateDaysUntil()">HESAPLA</button>
                    <button type="button" class="btn btn-outline-secondary px-3 btn-sm" onclick="resetForm()">Temizle</button>
                </div>
            </form>

            <div id="resultBox" class="result d-none result-box text-center mt-4">
                <div class="row g-0">
                    <div class="col-4 border-end">
                        <small class="text-muted d-block" style="font-size: 0.7rem;">Hedef Tarih</small>
                        <span class="fw-bold text-dark small" id="resTargetDate">-</span>
                    </div>
                    <div class="col-4 border-end">
                        <small class="text-muted d-block" style="font-size: 0.7rem;">Şafak</small>
                        <span class="fw-bold text-primary small" id="resDaysLeft">-</span>
                    </div>
                    <div class="col-4">
                        <small class="text-muted d-block" style="font-size: 0.7rem;">Durum</small>
                        <span class="fw-bold small" id="resStatus">-</span>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
