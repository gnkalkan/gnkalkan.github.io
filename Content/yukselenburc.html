

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6"> 
        <div class="card calculator-card p-4">
            <h3 class="text-center mb-4 text-dark">Yükselen Burç Hesaplama</h3>
            
            <form id="yukselenForm" class="d-flex flex-column align-items-center"> 
                
                <div class="mb-3 w-75">
                    <label for="birthDate" class="form-label fw-bold small">Doğum Tarihiniz</label>
                    <input type="date" class="form-control form-control-sm" id="birthDate" required>
                </div>

                <div class="mb-4 w-75">
                    <label for="birthTime" class="form-label fw-bold small">Doğum Saatiniz</label>
                    <input type="time" class="form-control form-control-sm" id="birthTime" required>
                    <div class="form-text" style="font-size: 0.7rem;">Yaklaşık bir saat girmeniz yeterlidir.</div>
                </div>

                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-dark px-4 btn-sm fw-bold" onclick="calculateRisingZodiac()">HESAPLA</button>
                    <button type="button" class="btn btn-outline-secondary px-3 btn-sm" onclick="resetForm()">Temizle</button>
                </div>
            </form>

            <div id="resultBox" class="result d-none result-box text-center mt-4">
                <div class="row g-0">
                    <div class="col-4 border-end">
                        <small class="text-muted d-block" style="font-size: 0.7rem;">Güneş Burcu</small>
                        <span class="fw-bold text-dark small" id="resSun">-</span>
                    </div>
                    <div class="col-4 border-end">
                        <small class="text-muted d-block" style="font-size: 0.7rem;">Yükselen</small>
                        <span class="fw-bold text-primary small" id="resAscendant">-</span>
                    </div>
                    <div class="col-4">
                        <small class="text-muted d-block" style="font-size: 0.7rem;">Yönetici Gezegen</small>
                        <span class="fw-bold text-info small" id="resPlanet">-</span>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
