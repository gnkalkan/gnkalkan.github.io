

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6"> 
        <div class="card calculator-card p-4">
            <h3 class="text-center mb-4 text-dark">Alan ve Çevre Hesaplama</h3>
            
            <form id="alanCevreForm" class="d-flex flex-column align-items-center"> 
                
                <div class="mb-3 w-75">
                    <label for="shapeSelect" class="form-label fw-bold small">Geometrik Şekil</label>
                    <select class="form-select form-select-sm" id="shapeSelect" onchange="toggleInputs()">
                        <option value="kare" selected>Kare</option>
                        <option value="dikdortgen">Dikdörtgen</option>
                        <option value="daire">Daire</option>
                    </select>
                </div>

                <div class="mb-3 w-75">
                    <label for="val1" class="form-label fw-bold small" id="lblVal1">1. Kenar / Yarıçap (cm)</label>
                    <input type="number" inputmode="decimal" class="form-control form-control-sm" id="val1" placeholder="Örn: 10" step="0.01" required>
                </div>

                <div class="mb-4 w-75">
                    <label for="val2" class="form-label fw-bold small text-muted" id="lblVal2">2. Kenar (cm)</label>
                    <input type="number" inputmode="decimal" class="form-control form-control-sm" id="val2" placeholder="Gerekli değil" step="0.01" disabled>
                </div>

                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-dark px-4 btn-sm fw-bold" onclick="calculateAreaPerimeter()">HESAPLA</button>
                    <button type="button" class="btn btn-outline-secondary px-3 btn-sm" onclick="resetForm()">Temizle</button>
                </div>
            </form>

            <div id="resultBox" class="result d-none result-box text-center mt-4">
                <div class="row g-0">
                    <div class="col-4 border-end">
                        <small class="text-muted d-block" style="font-size: 0.7rem;">Şekil</small>
                        <span class="fw-bold text-dark small" id="resShape">-</span>
                    </div>
                    <div class="col-4 border-end">
                        <small class="text-muted d-block" style="font-size: 0.7rem;">Çevre</small>
                        <span class="fw-bold text-info small" id="resPerimeter">0 cm</span>
                    </div>
                    <div class="col-4">
                        <small class="text-muted d-block" style="font-size: 0.7rem;">Alan</small>
                        <span class="fw-bold text-primary small" id="resArea">0 cm²</span>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
