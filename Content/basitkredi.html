

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card calculator-card p-4">
            <h3 class="text-center mb-4 text-dark">Basit Kredi Hesaplama</h3>

            <form id="krediForm" class="d-flex flex-column align-items-center">
                <div class="mb-3 w-75">
                    <label for="krediTutari" class="form-label fw-bold small">Kredi Tutarı (TL)</label>
                    <input type="number" inputmode="decimal" class="form-control form-control-sm" id="krediTutari" placeholder="Örn: 100000" required>
                </div>
                
                <div class="mb-3 w-75">
                    <label for="faizOrani" class="form-label fw-bold small">Aylık Faiz Oranı (%)</label>
                    <input type="number" step="0.01" class="form-control form-control-sm" id="faizOrani" placeholder="Örn: 3.50" required>
                </div>
                
                <div class="mb-4 w-75">
                    <label for="vade" class="form-label fw-bold small">Vade (Ay)</label>
                    <input type="number" class="form-control form-control-sm" id="vade" placeholder="Örn: 24" required>
                </div>
                
                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-dark px-4 btn-sm fw-bold" onclick="calculatesimpleloan()">Hesapla</button>
                    <button type="button" class="btn btn-outline-secondary px-3 btn-sm" onclick="resetForm()">Temizle</button>
                    
                </div>
            </form>
            
            <div id="resultBox" class="result d-none card-footer bg-white border-top-0 p-4">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <span class="text-secondary">Aylık Taksit:</span>
                    <strong class="text-primary fs-5" id="aylikTaksit">0,00 TL</strong>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <span class="text-secondary">Toplam Geri Ödeme:</span>
                    <strong class="text-dark fs-6" id="toplamOdeme">0,00 TL</strong>
                </div>
                <div class="d-flex justify-content-between align-items-center">
                    <span class="text-secondary">Toplam Faiz:</span>
                    <strong class="text-danger fs-6" id="toplamFaiz">0,00 TL</strong>
                </div>
            </div>

        </div>
    </div>
</div>
