

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6"> 
        <div class="card calculator-card p-4">
            <h3 class="text-center mb-4 text-dark">Yüzde Hesaplama</h3>
            
            <form id="yuzdeForm" class="d-flex flex-column align-items-center"> 
                
                <div class="mb-3 w-75">
                    <label for="baseNumber" class="form-label fw-bold small">Ana Sayı</label>
                    <input type="number" inputmode="decimal" class="form-control form-control-sm" id="baseNumber" placeholder="Örn: 1500" step="0.01" required>
                </div>

                <div class="mb-3 w-75">
                    <label for="percentageRate" class="form-label fw-bold small">Yüzde Oranı (%)</label>
                    <input type="number" inputmode="decimal" class="form-control form-control-sm" id="percentageRate" placeholder="Örn: 18" step="0.01" required>
                </div>

                <div class="mb-4 text-center w-100">
                    <label class="form-label fw-bold d-block small">İşlem Türü</label>
                    <div class="btn-group btn-group-sm" role="group">
                        <input type="radio" class="btn-check" name="yuzdeType" id="typeFind" value="find" checked autocomplete="off">
                        <label class="btn-outline-dark btn" for="typeFind">% Bul</label>

                        <input type="radio" class="btn-check" name="yuzdeType" id="typeAdd" value="add" autocomplete="off">
                        <label class="btn-outline-dark btn" for="typeAdd">% Ekle (+)</label>

                        <input type="radio" class="btn-check" name="yuzdeType" id="typeSub" value="sub" autocomplete="off">
                        <label class="btn-outline-dark btn" for="typeSub">% Çıkar (-)</label>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-dark px-4 btn-sm fw-bold" onclick="calculatePercentage()">HESAPLA</button>
                    <button type="button" class="btn btn-outline-secondary px-3 btn-sm" onclick="resetForm()">Temizle</button>
                </div>
            </form>

            <div id="resultBox" class="result d-none result-box text-center mt-4">
                <div class="row g-0">
                    <div class="col-4 border-end">
                        <small class="text-muted d-block" style="font-size: 0.7rem;">Ana Sayı</small>
                        <span class="fw-bold text-dark small" id="resBase">0</span>
                    </div>
                    <div class="col-4 border-end">
                        <small class="text-muted d-block" style="font-size: 0.7rem;" id="lblAmount">Yüzde Karşılığı</small>
                        <span class="fw-bold text-info small" id="resAmount">0</span>
                    </div>
                    <div class="col-4">
                        <small class="text-muted d-block" style="font-size: 0.7rem;">Sonuç</small>
                        <span class="fw-bold text-primary small" id="resTotal">0</span>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
